name: Prototype Pollution Detector

on: [push, pull_request]

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Scan for prototype pollution patterns
        run: |
          if grep -rE "__proto__|constructor\.prototype|Object\.prototype\s*=" . --include="*.js" --include="*.html"; then
            echo "::error::🚨 PROTOTYPE POLLUTION VULNERABILITY DETECTED!"
            exit 1
          fi
